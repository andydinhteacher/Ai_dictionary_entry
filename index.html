<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESL Dictionary Entry Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,300;0,400;0,700;1,400&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Merriweather', serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Icons (Inline SVGs for portability) ---
        const Icon = ({ path, className, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {path}
            </svg>
        );

        const Icons = {
            Book: (props) => <Icon path={<><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" /><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" /></>} {...props} />,
            Key: (props) => <Icon path={<><circle cx="7.5" cy="15.5" r="5.5" /><path d="m21 2-9.6 9.6" /><path d="m15.5 7.5 3 3L22 7l-3-3" /></>} {...props} />,
            Loader2: (props) => <Icon path={<path d="M21 12a9 9 0 1 1-6.219-8.56" />} {...props} />,
            Copy: (props) => <Icon path={<><rect width="14" height="14" x="8" y="8" rx="2" ry="2" /><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" /></>} {...props} />,
            RefreshCw: (props) => <Icon path={<><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M8 16H3v5" /></>} {...props} />,
            Check: (props) => <Icon path={<polyline points="20 6 9 17 4 12" />} {...props} />,
            Settings: (props) => <Icon path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.39a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></>} {...props} />,
            ExternalLink: (props) => <Icon path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><polyline points="15 3 21 3 21 9" /><line x1="10" y1="14" x2="21" y2="3" /></>} {...props} />,
            ShieldCheck: (props) => <Icon path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></>} {...props} />
        };

        // --- Main Application ---
        function App() {
            const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
            const [isConfiguring, setIsConfiguring] = useState(!localStorage.getItem('gemini_api_key'));

            const handleSaveKey = (key) => {
                localStorage.setItem('gemini_api_key', key);
                setApiKey(key);
                setIsConfiguring(false);
            };

            const handleClearKey = () => {
                localStorage.removeItem('gemini_api_key');
                setApiKey('');
                setIsConfiguring(true);
            };

            if (isConfiguring) {
                return <WelcomeScreen onSave={handleSaveKey} existingKey={apiKey} />;
            }

            return (
                <DictionaryGenerator 
                    apiKey={apiKey} 
                    onOpenSettings={() => setIsConfiguring(true)} 
                />
            );
        }

        // --- Welcome / Config Screen ---
        function WelcomeScreen({ onSave, existingKey }) {
            const [input, setInput] = useState(existingKey);

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                    <div className="bg-white max-w-lg w-full rounded-2xl shadow-xl border border-slate-200 p-8 fade-in">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <Icons.ShieldCheck className="w-8 h-8" />
                            </div>
                            <h1 className="text-2xl font-bold text-slate-800">Welcome, Teacher!</h1>
                            <p className="text-slate-500 mt-2">To use this Dictionary Generator, please enter your Gemini API Key.</p>
                        </div>

                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Google Gemini API Key</label>
                                <input 
                                    type="password" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="AIzaSy..."
                                    className="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all font-mono text-sm"
                                />
                            </div>

                            <button 
                                onClick={() => input && onSave(input)}
                                disabled={!input}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                            >
                                Start Creating <Icons.Check className="w-4 h-4" />
                            </button>

                            <div className="bg-blue-50 p-4 rounded-lg border border-blue-100 text-sm text-blue-800">
                                <h3 className="font-bold flex items-center gap-2 mb-2">
                                    How to get a free API Key:
                                </h3>
                                <ol className="list-decimal list-inside space-y-2 ml-1">
                                    <li>Go to <a href="https://aistudio.google.com/app/apikey" target="_blank" className="underline font-semibold hover:text-blue-600 inline-flex items-center gap-1">Google AI Studio <Icons.ExternalLink className="w-3 h-3" /></a>.</li>
                                    <li>Log in with your Google account.</li>
                                    <li>Click <strong>"Create API Key"</strong>.</li>
                                    <li>Copy the key (starts with <code>AIzaSy...</code>) and paste it above.</li>
                                </ol>
                                <p className="mt-3 text-xs opacity-80 border-t border-blue-200 pt-2">
                                    Your key is stored locally in your browser and is never sent to any other server.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Generator Component ---
        function DictionaryGenerator({ apiKey, onOpenSettings }) {
            const [inputWord, setInputWord] = useState('');
            const [grade, setGrade] = useState('9');
            const [loading, setLoading] = useState(false);
            const [data, setData] = useState(null);
            const [showKey, setShowKey] = useState(false);
            const [error, setError] = useState('');
            const [copied, setCopied] = useState(false);

            const generateContent = async () => {
                if (!inputWord) {
                    setError('Vui lòng nhập từ vựng.');
                    return;
                }

                setLoading(true);
                setError('');
                setData(null);
                setShowKey(false);
                setCopied(false);

                const gradeContext = grade === '9' 
                    ? "Grade 10 entrance exams in Vietnam (Ho Chi Minh City format). Level: B1/B2. Focus on challenging collocations, phrasal verbs, and subtle meaning distinctions." 
                    : "Grade 8 curriculum in Vietnam (Friends Plus, Smart World, Global Success). Level: A2/B1. Focus on essential phrasal verbs, common collocations, and clear definitions suitable for 13-14 year olds.";

                const prompt = `
                    You are an expert ESL test creator for ${gradeContext}
                    
                    Task: Create a dictionary entry exercise for the English word: "${inputWord}".
                    
                    Requirements:
                    1.  **Dictionary Entry**: Provide exactly 4 distinct meanings/usages for this word appropriate for Grade ${grade} students.
                        - Mix specific collocations, phrasal verbs, or idioms suitable for this level.
                        - Each entry must have a definition and an example sentence.
                        - In the example sentence, BOLD the key phrase (using markdown **).
                    2.  **Questions**: Create exactly 2 fill-in-the-blank sentences.
                        - The sentences must use the context of 2 DIFFERENT definitions from the 4 provided above.
                        - The blank must require **EXACTLY 2 to 3 words** to fill (based on the bolded phrases in the entry). DO NOT use single words.
                        - The sentences should be at a difficulty level suitable for good Grade ${grade} students.
                    
                    Output strictly in valid JSON format with this structure:
                    {
                        "word": "${inputWord}",
                        "ipa": "/.../",
                        "definitions": [
                            { "type": "phrasal verb/idiom/noun/etc", "definition": "short definition", "example": "sentence with **bold phrase**", "phrase": "the bold phrase only" },
                            { ... (total 4 items) }
                        ],
                        "questions": [
                            { "sentence": "Sentence with __________ gap.", "answer": "2-3 words answer", "explanation": "Briefly link to which definition number (1-4)" },
                            { ... (total 2 items) }
                        ]
                    }
                `;

                try {
                    let attempts = 0;
                    let success = false;
                    let result;

                    while (attempts < 3 && !success) {
                        try {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ parts: [{ text: prompt }] }],
                                    generationConfig: { responseMimeType: "application/json" }
                                })
                            });

                            if (!response.ok) {
                                const errData = await response.json();
                                throw new Error(errData.error?.message || 'API Error');
                            }
                            
                            result = await response.json();
                            success = true;
                        } catch (e) {
                            console.error(e);
                            if (e.message.includes('API key')) throw e; // Don't retry auth errors
                            attempts++;
                            await new Promise(r => setTimeout(r, 1000 * attempts));
                        }
                    }

                    if (!success || !result) throw new Error('Failed to fetch data');

                    const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textResponse) throw new Error('No content returned');

                    const parsedData = JSON.parse(textResponse);
                    setData(parsedData);

                } catch (err) {
                    setError('Lỗi: ' + (err.message || 'Không thể tạo nội dung. Vui lòng kiểm tra API Key và thử lại.'));
                } finally {
                    setLoading(false);
                }
            };

            const renderFormattedText = (text) => {
                const parts = text.split(/(\*\*.*?\*\*)/g);
                return parts.map((part, index) => {
                    if (part.startsWith('**') && part.endsWith('**')) {
                        return <strong key={index} className="font-bold text-black">{part.slice(2, -2)}</strong>;
                    }
                    return <span key={index}>{part}</span>;
                });
            };

            const copyToClipboard = () => {
                if (!data) return;
                const text = `
Word: ${data.word} ${data.ipa} (Grade ${grade} Level)
Dictionary Entry:
${data.definitions.map((d, i) => `${i + 1}. ${d.phrase} (${d.type}): ${d.definition}\n   Ex: ${d.example.replace(/\*\*/g, '')}`).join('\n')}

Questions:
1. ${data.questions[0].sentence}
2. ${data.questions[1].sentence}

Key:
1. ${data.questions[0].answer}
2. ${data.questions[1].answer}
                `;

                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    textArea.style.top = "0";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    if (successful) {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    }
                } catch (err) {
                    console.error("Fallback copy failed:", err);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-4xl mx-auto space-y-6">
                        
                        {/* Header Section */}
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <div className="flex flex-col md:flex-row md:items-center justify-between mb-6 gap-4">
                                <div>
                                    <h1 className="text-2xl font-bold text-blue-700 flex items-center gap-2">
                                        <Icons.Book className="w-8 h-8" />
                                        Dictionary Entry Generator
                                    </h1>
                                    <p className="text-slate-500 text-sm font-medium italic mt-1 ml-10">
                                        By Mr. Anh Đinh, for educators
                                    </p>
                                </div>
                                
                                <div className="flex items-center gap-4 self-start">
                                    <div className="flex items-center gap-2 bg-slate-100 p-1 rounded-lg">
                                        <button 
                                            onClick={() => setGrade('8')}
                                            className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${
                                                grade === '8' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                            }`}
                                        >
                                            Grade 8
                                        </button>
                                        <button 
                                            onClick={() => setGrade('9')}
                                            className={`px-4 py-1.5 rounded-md text-sm font-semibold transition-all ${
                                                grade === '9' ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'
                                            }`}
                                        >
                                            Grade 9
                                        </button>
                                    </div>
                                    <button 
                                        onClick={onOpenSettings}
                                        className="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-full transition-colors"
                                        title="Configure API Key"
                                    >
                                        <Icons.Settings className="w-6 h-6" />
                                    </button>
                                </div>
                            </div>
                            
                            <div className="grid gap-4 md:grid-cols-[1fr_auto]">
                                <div>
                                    <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">
                                        Từ vựng (Word) - <span className="text-blue-600">Level: Grade {grade}</span>
                                    </label>
                                    <input 
                                        type="text" 
                                        value={inputWord}
                                        onChange={(e) => setInputWord(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && generateContent()}
                                        placeholder="e.g., set, take, hand, mind..."
                                        className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-medium text-lg"
                                        autoFocus
                                    />
                                </div>
                                <div className="flex items-end">
                                    <button 
                                        onClick={generateContent}
                                        disabled={loading}
                                        className="flex items-center gap-2 px-8 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed h-[46px]"
                                    >
                                        {loading ? <Icons.Loader2 className="w-5 h-5 animate-spin" /> : <Icons.RefreshCw className="w-5 h-5" />}
                                        Generate
                                    </button>
                                </div>
                            </div>
                            {error && <p className="text-red-500 text-sm mt-3">{error}</p>}
                        </div>

                        {/* Content Area */}
                        {data && (
                            <div className="grid lg:grid-cols-2 gap-6 fade-in">
                                
                                {/* Left Column: The Dictionary Entry Image */}
                                <div className="bg-white rounded-none border-2 border-slate-800 shadow-lg p-6 relative font-serif">
                                    <div className="absolute top-0 left-0 bg-slate-800 text-white text-xs px-2 py-1 font-sans flex items-center gap-2">
                                        <span>Dictionary Entry</span>
                                        <span className="opacity-50">|</span>
                                        <span className="font-semibold text-yellow-300">Grade {grade}</span>
                                    </div>
                                    
                                    <div className="mt-4 border-b border-slate-300 pb-2 mb-4">
                                        <span className="text-3xl font-bold text-slate-900">{data.word}</span>
                                        <span className="ml-3 text-slate-500 font-sans text-lg">{data.ipa}</span>
                                    </div>

                                    <div className="space-y-5">
                                        {data.definitions.map((def, idx) => (
                                            <div key={idx} className="group">
                                                <div className="flex items-baseline gap-2">
                                                    <span className="font-bold text-blue-800 text-sm font-sans px-1.5 py-0.5 bg-blue-50 rounded">
                                                        {idx + 1}
                                                    </span>
                                                    <span className="font-bold text-slate-700 italic text-sm font-sans lowercase">({def.type})</span>
                                                    <span className="text-slate-700 font-bold">{def.phrase}</span>:
                                                </div>
                                                <div className="pl-8 text-slate-600 mb-1 leading-tight">
                                                    {def.definition}
                                                </div>
                                                <div className="pl-8 text-slate-800 italic border-l-2 border-slate-200 pl-3 ml-2">
                                                    “{renderFormattedText(def.example)}”
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* Right Column: Questions & Tools */}
                                <div className="space-y-6">
                                    
                                    {/* The Question Card */}
                                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                                        <div className="flex justify-between items-center mb-4">
                                            <h2 className="font-bold text-lg text-slate-800">Practice Questions</h2>
                                            <button 
                                                onClick={copyToClipboard} 
                                                className="flex items-center gap-1 text-slate-500 hover:text-blue-600 transition-colors" 
                                                title="Copy Text"
                                            >
                                                {copied ? (
                                                    <span className="text-green-600 flex items-center text-sm font-medium">
                                                        <Icons.Check className="w-4 h-4 mr-1" /> Copied!
                                                    </span>
                                                ) : (
                                                    <span className="flex items-center text-sm">
                                                        <Icons.Copy className="w-4 h-4 mr-1" /> Copy Text
                                                    </span>
                                                )}
                                            </button>
                                        </div>
                                        
                                        <p className="text-sm text-slate-500 mb-4 italic">
                                            Look at the dictionary entry and complete the sentences with <strong>2-3 words</strong>.
                                        </p>

                                        <div className="space-y-6">
                                            {data.questions.map((q, idx) => (
                                                <div key={idx} className="p-4 bg-slate-50 rounded-lg border border-slate-100">
                                                    <div className="flex gap-3">
                                                        <span className="font-bold text-blue-600">{idx + 1}.</span>
                                                        <p className="text-slate-800 leading-relaxed text-lg">
                                                            {q.sentence.split('__________').map((part, i, arr) => (
                                                                <React.Fragment key={i}>
                                                                    {part}
                                                                    {i < arr.length - 1 && (
                                                                        <span className="inline-block w-24 border-b-2 border-slate-400 mx-1"></span>
                                                                    )}
                                                                </React.Fragment>
                                                            ))}
                                                        </p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* Answer Key Toggle */}
                                    <div className="bg-blue-50 rounded-xl border border-blue-100 p-6">
                                        <div className="flex justify-between items-center">
                                            <h3 className="font-semibold text-blue-900 flex items-center gap-2">
                                                <Icons.Key className="w-5 h-5" />
                                                Answer Key
                                            </h3>
                                            <button 
                                                onClick={() => setShowKey(!showKey)}
                                                className="text-sm font-medium text-blue-600 hover:text-blue-800 hover:underline"
                                            >
                                                {showKey ? 'Hide Key' : 'Show Key'}
                                            </button>
                                        </div>

                                        {showKey && (
                                            <div className="mt-4 pt-4 border-t border-blue-200 grid gap-3 fade-in">
                                                {data.questions.map((q, idx) => (
                                                    <div key={idx} className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 p-2 rounded bg-white/60">
                                                        <div className="flex items-center gap-2">
                                                            <span className="font-bold text-slate-500 w-6">{idx + 1}.</span>
                                                            <span className="font-bold text-green-700 text-lg font-mono">{q.answer}</span>
                                                        </div>
                                                        <span className="text-xs text-slate-500 italic">
                                                            (Related to definition #{q.explanation.match(/\d/)?.[0] || '?'})
                                                        </span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Empty State / Intro */}
                        {!data && !loading && !error && (
                            <div className="text-center py-12 text-slate-400">
                                <Icons.Book className="w-16 h-16 mx-auto mb-4 opacity-20" />
                                <p className="text-lg">Nhập một từ vựng để tạo bài tập.</p>
                                <p className="text-sm mt-2">Ví dụ: <span className="font-mono bg-slate-100 px-1 rounded">get</span>, <span className="font-mono bg-slate-100 px-1 rounded">take</span>, <span className="font-mono bg-slate-100 px-1 rounded">hand</span>, <span className="font-mono bg-slate-100 px-1 rounded">run</span></p>
                                <p className="text-xs text-slate-300 mt-8 italic">Tool developed by Mr. Anh Đinh</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
